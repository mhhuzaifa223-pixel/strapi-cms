services:
  strapi:
    image: mhhuzaifa/strapi-cms:latest
    container_name: strapi-app
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    ports:
      - "1337:1337"
    volumes:
      - strapi_uploads:/opt/app/public/uploads

volumes:
  strapi_uploads: